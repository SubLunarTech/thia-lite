<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Setting up AI Engine</title>
    <style>
        :root {
            --bg-base: #0B0E14;
            --bg-surface: #151A22;
            --text-primary: #E5E7EB;
            --text-muted: #9CA3AF;
            --accent: #818CF8;
            --success: #34D399;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                text-shadow: 0 0 15px var(--accent);
            }

            100% {
                transform: scale(1);
                opacity: 0.8;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
            background: var(--bg-surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
            display: inline-block;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 30px 0;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        .btn-primary {
            background: rgba(129, 140, 248, 0.1);
            border-color: rgba(129, 140, 248, 0.3);
        }

        .btn-primary:hover {
            background: rgba(129, 140, 248, 0.2);
            border-color: var(--accent);
        }

        .btn-icon {
            font-size: 24px;
            margin-right: 15px;
        }

        .btn-text strong {
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
        }

        .btn-text span {
            color: var(--text-muted);
            font-size: 12px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
            display: none;
            /* Hidden initially */
        }

        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }

        /* Indeterminate loading animation */
        .progress-bar.indeterminate {
            width: 50%;
            animation: indeterminate 1.5s infinite ease-in-out;
            position: absolute;
        }

        @keyframes indeterminate {
            0% {
                left: -50%;
                width: 50%;
            }

            50% {
                left: 25%;
                width: 100%;
            }

            100% {
                left: 100%;
                width: 50%;
            }
        }

        .status-text {
            font-size: 13px;
            color: var(--accent);
            font-family: monospace;
            display: none;
            /* Hidden initially */
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s infinite linear;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">✨</div>
        <h1 id="main-title">AI Engine Setup</h1>
        <p id="main-desc">How would you like to run the AI? You can run it locally for privacy, or use a cloud API key
            (OpenAI, Anthropic, etc).</p>

        <div id="choice-container" class="button-group">
            <button class="btn btn-primary" onclick="selectChoice('local')">
                <span class="btn-icon">💻</span>
                <span class="btn-text">
                    <strong>Local AI (Recommended)</strong>
                    <span>Private & free. Downloads Ollama + 3GB model.</span>
                </span>
            </button>
            <button class="btn" onclick="selectChoice('cloud')">
                <span class="btn-icon">☁️</span>
                <span class="btn-text">
                    <strong>Cloud API Key</strong>
                    <span>Fast. Requires you to bring your own API key.</span>
                </span>
            </button>
        </div>

        <div id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar indeterminate"></div>
        </div>

        <div id="status-container" class="status-text">
            <span class="spinner"></span>
            <span id="status-message">Initializing...</span>
        </div>
    </div>

    <script>
        function selectChoice(choice) {
            document.getElementById('choice-container').style.display = 'none';
            if (choice === 'local') {
                document.getElementById('main-title').textContent = 'Preparing Local AI';
                document.getElementById('main-desc').textContent = 'This will take a few minutes depending on your internet connection.';
                document.getElementById('progress-container').style.display = 'block';
                document.getElementById('status-container').style.display = 'block';
            }
            window.electronAPI.sendInstallChoice(choice);
        }

        // Listen for IPC messages from main process
        window.electronAPI.onInstallProgress((data) => {
            const statusEl = document.getElementById('status-message');
            const barEl = document.getElementById('progress-bar');

            if (data.status) {
                statusEl.textContent = data.status;
            }

            if (data.percent !== undefined) {
                barEl.classList.remove('indeterminate');
                barEl.style.width = Math.min(100, Math.max(0, data.percent)) + '%';
            } else if (data.indeterminate) {
                barEl.classList.add('indeterminate');
                barEl.style.width = '50%';
            }
        });
    </script>
</body>

</html>
