# Thia-Lite Release CI/CD
# Builds desktop apps (Electron + Python backend) and publishes to GitHub Releases
# Triggered on version tags (v*)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Electron Desktop Builds (one-click install) ────────────────────────────
  build-electron:
    needs: build-cli
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
          - platform: 'ubuntu-22.04'
            os: 'linux'
          - platform: 'macos-latest'
            os: 'macos'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download CLI backend
        uses: actions/download-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: desktop/electron/bin

      - name: Make CLI executable (Linux/macOS)
        if: matrix.os != 'windows'
        run: chmod +x desktop/electron/bin/thia-lite || true

      - name: Install Electron dependencies
        run: npm install
        working-directory: ./desktop/electron

      - name: Build Electron app (Linux)
        if: matrix.os == 'linux'
        run: npm run build
        working-directory: ./desktop/electron
        env:
          NODE_ENV: production

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: npm run build:win
        working-directory: ./desktop/electron
        env:
          NODE_ENV: production

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos'
        run: npm run build:mac
        working-directory: ./desktop/electron
        env:
          NODE_ENV: production

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: electron-${{ matrix.os }}
          path: |
            desktop/electron/dist/*.exe
            desktop/electron/dist/*.AppImage
            desktop/electron/dist/*.dmg
          if-no-files-found: ignore

  # ─── Python CLI Builds (PyInstaller standalone) ─────────────────────────────
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            os: 'linux'
          - platform: 'windows-latest'
            os: 'windows'
          - platform: 'macos-latest'
            os: 'macos'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build standalone binary
        run: pyinstaller thia-lite.spec

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: dist/thia-lite*

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-electron, build-cli]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true

      - name: List artifacts
        run: find . -type f | head -50

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        if: always()
        with:
          name: Thia ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            electron-windows/thia.exe
            electron-linux/thia.AppImage
            electron-macos/thia.dmg
            cli-windows/thia-lite.exe
            cli-linux/thia-lite
            cli-macos/thia-lite
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
