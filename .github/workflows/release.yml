# Thia-Lite Release CI/CD
# Builds desktop apps (Electron + Python backend) and publishes to GitHub Releases
# Triggered on version tags (v*)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Electron Desktop Builds (one-click install) ────────────────────────────
  build-electron:
    needs: build-cli
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
          - platform: 'ubuntu-22.04'
            os: 'linux'
          - platform: 'macos-latest'
            os: 'macos'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download CLI backend
        uses: actions/download-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: desktop/electron/bin

      - name: Make CLI executable (Linux/macOS)
        if: matrix.os != 'windows'
        run: chmod +x desktop/electron/bin/thia-lite || true

      - name: Install Electron dependencies
        run: npm install
        working-directory: ./desktop/electron

      - name: Build Electron app (Linux)
        if: matrix.os == 'linux'
        run: |
          echo "=== Starting Linux Build ==="
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Working directory: $(pwd)"
          echo "Dist folder contents before build:"
          ls -la desktop/electron/dist 2>/dev/null || echo "Dist folder does not exist yet"
          
          npm run build
          
          echo "=== Build Complete ==="
          echo "Dist folder contents after build:"
          ls -laR desktop/electron/dist
        working-directory: ./desktop/electron
        env:
          NODE_ENV: production
          DEBUG: electron-builder

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Write-Host "=== Starting Windows Build ==="
          Write-Host "Node version: $(node --version)"
          Write-Host "NPM version: $(npm --version)"
          Write-Host "Working directory: $(Get-Location)"
          Write-Host "Dist folder contents before build:"
          Get-ChildItem -Path desktop/electron/dist -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          
          npm run build:win
          
          Write-Host "=== Build Complete ==="
          Write-Host "Dist folder contents after build:"
          Get-ChildItem -Path desktop/electron/dist -Recurse | ForEach-Object { Write-Host $_.FullName }
        working-directory: ./desktop/electron
        env:
          NODE_ENV: production
          DEBUG: electron-builder

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos'
        run: npm run build:mac
        working-directory: ./desktop/electron
        env:
          NODE_ENV: production

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: electron-${{ matrix.os }}
          path: |
            desktop/electron/dist/**/*
          if-no-files-found: warn

  # ─── Python CLI Builds (PyInstaller standalone) ─────────────────────────────
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-latest'
            os: 'linux'
          - platform: 'windows-latest'
            os: 'windows'
          - platform: 'macos-latest'
            os: 'macos'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build standalone binary
        run: |
          echo "=== Building CLI Binary ==="
          echo "Python version: $(python --version)"
          echo "PyInstaller version: $(pyinstaller --version)"
          echo "Spec file:"
          cat thia-lite.spec
          pyinstaller thia-lite.spec
          echo "=== Build Complete ==="
          echo "Dist contents:"
          if [ "$RUNNER_OS" == "Windows" ]; then
            Get-ChildItem dist/
          else
            ls -la dist/
          fi
        shell: bash

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.os }}
          path: dist/thia-lite*
          if-no-files-found: warn

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: [build-electron, build-cli]
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          merge-multiple: true
          path: electron-artifacts

      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: cli-artifacts

      - name: List artifacts
        run: |
          echo "=== Electron Artifacts ==="
          find electron-artifacts -type f 2>/dev/null || echo "No electron artifacts"
          echo "=== CLI Artifacts ==="
          find cli-artifacts -type f 2>/dev/null || echo "No CLI artifacts"

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: Thia ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            electron-artifacts/**/thia-setup.exe
            electron-artifacts/**/*.AppImage
            electron-artifacts/**/*.dmg
            cli-artifacts/thia-lite.exe
            cli-artifacts/thia-lite
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
