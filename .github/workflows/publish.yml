name: "Publish Desktop App"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: 'windows'
          - platform: 'ubuntu-22.04'
            os: 'linux'
          - platform: 'macos-latest'
            os: 'macos'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install
        working-directory: ./desktop

      - name: install tauri cli
        run: npm install -g @tauri-apps/cli
        working-directory: ./desktop

      - name: build tauri app
        run: npx tauri build
        working-directory: ./desktop
        env:
          TAURI_BUNDLE_IDENTIFIER: com.thia-libre.thia-lite

      - name: upload windows artifacts
        uses: actions/upload-artifact@v4
        if: success() && matrix.os == 'windows'
        with:
          name: windows-setup
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: upload linux artifacts
        uses: actions/upload-artifact@v4
        if: success() && matrix.os == 'linux'
        with:
          name: linux-appimage
          path: desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

      - name: upload macos artifacts
        uses: actions/upload-artifact@v4
        if: success() && matrix.os == 'macos'
        with:
          name: macos-dmg
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
